<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoldPulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>GoldPulse</h1>
        <p>Live Market Prices</p>
    </header>

    <section class="container">

        <div class="card">
            <h2>Gold Price</h2>
            <p id="gold">Loading...</p>
        </div>

        <div class="card">
            <h2>Bitcoin</h2>
            <p id="btc">Loading...</p>
        </div>

        <div class="card">
            <h2>USD to EGP</h2>
            <p id="usd">Loading...</p>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
